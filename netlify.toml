[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/qb-callback"
  status = 200
  force = true
  query = {code = ":code", realmId = ":realmId", state = ":state"}

[[redirects]]
  from = "/api/qb/*"
  to = "/.netlify/functions/qb-api"
  status = 200
  force = true

[[redirects]]
  from = "/api/calendar/events"
  to = "/.netlify/functions/gcal-events"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
